<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paddock — Valuation Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<style>
  body { margin: 0; background: #16281E; color: #EDE7DA; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .font-serif { font-family: Didot, 'Bodoni MT', Baskerville, 'Playfair Display', Georgia, 'Times New Roman', serif !important; }
  #err { display: none; position: fixed; bottom: 8px; left: 8px; right: 8px; background: #7f1d1d; color: #fff; padding: 10px 14px; border-radius: 8px; font: 13px monospace; z-index: 999999; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="valuation-root"></div>
<div id="err"></div>
<script>window.addEventListener("error",function(e){var d=document.getElementById("err");if(d){d.style.display="block";d.textContent="Error: "+(e.message||e.type)}});</script>
<script src="assets/valuation-demo.js"></script>
</body>
</html>
